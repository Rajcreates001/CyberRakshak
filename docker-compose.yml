

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  user: "${AIRFLOW_UID:-50000}:${AIRFLOW_GID:-0}"
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__FAB__UPDATE_FAB_PERMS: "True"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_METADATA_DB_PASSWORD}@postgres/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: autonex-demo-key
    AIRFLOW__WEBSERVER__WORKERS: "2"
    AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "True"
    AIRFLOW__WEBSERVER__PROXY_FIX_X_FOR: "1"
    AIRFLOW__WEBSERVER__PROXY_FIX_X_PROTO: "1"
    AIRFLOW__WEBSERVER__PROXY_FIX_X_HOST: "1"
    AIRFLOW__WEBSERVER__PROXY_FIX_X_PORT: "1"
    AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8088/airflow
    AIRFLOW_CONN_FS_DEFAULT: fs:///?path=/opt/airflow
    SPARK_MASTER_URL: "local[*]"
    KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    PYTHONPATH: /opt/airflow
    PYTHONUNBUFFERED: "1"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./datasets:/opt/airflow/datasets
    - ./backend:/opt/airflow/backend
    - ./spark_job.py:/opt/airflow/spark_job.py
    - ./spark_streaming_job.py:/opt/airflow/spark_streaming_job.py
    - ./kafka:/opt/airflow/kafka
    - ./ai_engine:/opt/airflow/ai_engine
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
    kafka:
      condition: service_started
  networks:
    - cyberrakshak
  env_file:
    - .env

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_METADATA_DB_PASSWORD}
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    networks:
      - cyberrakshak
    env_file:
      - .env

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "12181:2181"
    restart: always
    networks:
      - cyberrakshak

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "19092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: always
    networks:
      - cyberrakshak

  kafka-topic-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - kafka
    entrypoint: [ "/bin/bash", "-c" ]
    command: >
      bash -c "
        echo 'Waiting for Kafka broker...';
        while ! nc -z kafka 9092; do
          echo 'Waiting for Kafka...'
          sleep 1
        done
        echo 'Kafka is ready!'
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic security-logs --partitions 1 --replication-factor 1;
        kafka-topics --bootstrap-server kafka:9092 --list;
      "
    networks:
      - cyberrakshak

  spark-master:
    image: apache/spark:3.5.1
    command: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master", "--port", "7077", "--webui-port", "8080" ]
    ports:
      - "18080:8080"
      - "17077:7077"
    volumes:
      - ./data:/opt/spark/data
      - ./data:/opt/airflow/data
      - ./datasets:/opt/spark/datasets
      - ./datasets:/opt/airflow/datasets
      - ./spark_job.py:/opt/spark/spark_job.py
      - ./spark_streaming_job.py:/opt/spark/spark_streaming_job.py
    restart: always
    networks:
      - cyberrakshak

  spark-worker:
    image: apache/spark:3.5.1
    depends_on:
      - spark-master
    command: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077" ]
    volumes:
      - ./data:/opt/spark/data
      - ./data:/opt/airflow/data
      - ./datasets:/opt/spark/datasets
      - ./datasets:/opt/airflow/datasets
    restart: always
    networks:
      - cyberrakshak

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      STREAM_OUTPUT_DIR: /app/data/stream_output
      AIRFLOW_BASE_URL: http://airflow-webserver:8080
      AIRFLOW_USERNAME: admin
      AIRFLOW_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      DATASETS_DIR: /app/datasets
      AI_ENGINE_BASE_URL: http://ai-engine:8001
      SPARK_MASTER_URL: ${SPARK_MASTER_URL}
      SPARK_MASTER_WEB_URL: ${SPARK_MASTER_WEB_URL}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PYTHONPATH: /app
    volumes:
      - ./data:/app/data
      - ./datasets:/app/datasets
      - ./logs:/app/logs
      - ./ai_engine:/app/ai_engine
      - ./backend:/app/backend
    ports:
      - "18000:8000"
    depends_on:
      - spark-master
      - kafka
      - ai-engine
    restart: always
    networks:
      - cyberrakshak
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:18000/api"
        VITE_WS_URL: "ws://localhost:18000/ws/stream"
    ports:
      - "15173:5173"
    depends_on:
      - backend-api
    restart: always
    networks:
      - cyberrakshak

  ai-engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    ports:
      - "18001:8001"
    environment:
      AI_ENGINE_HOST: 0.0.0.0
      AI_ENGINE_PORT: "8001"
    restart: always
    networks:
      - cyberrakshak

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "airflow db migrate && (airflow users create --username admin --password ${AIRFLOW_ADMIN_PASSWORD} --firstname Admin --lastname User --role Admin --email admin@example.com || true)"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "18081:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8088:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend-api
      - airflow-webserver
      - spark-master
    restart: always
    networks:
      - cyberrakshak

volumes:
  postgres-db-volume:

networks:
  cyberrakshak:
    driver: bridge
